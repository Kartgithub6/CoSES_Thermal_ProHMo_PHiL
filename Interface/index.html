<!DOCTYPE html>
<html>
<head>
    <title>Three-Zone Building Model Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏠 Three-Zone Building Model Generator</h1>
        
        <form id="modelForm">
            <!-- Zone Parameters -->
            <section>
                <h2>Zone Geometry</h2>
                <div class="parameter-group">
                    <label>Living Room Area [m²]:</label>
                    <input type="number" id="AZone_living" value="100" min="50" max="200">
                </div>
                <div class="parameter-group">
                    <label>Cellar Area [m²]:</label>
                    <input type="number" id="AZone_cellar" value="80" min="50" max="150">
                </div>
                <div class="parameter-group">
                    <label>Roof Area [m²]:</label>
                    <input type="number" id="AZone_roof" value="60" min="30" max="100">
                </div>
            </section>
            
            <!-- Radiator Sizes -->
            <section>
                <h2>Radiator Capacities</h2>
                <div class="parameter-group">
                    <label>Living Room Radiator [W]:</label>
                    <input type="number" id="Q_living" value="3500" min="1000" max="5000" step="100">
                </div>
                <div class="parameter-group">
                    <label>Cellar Radiator [W]:</label>
                    <input type="number" id="Q_cellar" value="1500" min="500" max="3000" step="100">
                </div>
                <div class="parameter-group">
                    <label>Roof Radiator [W]:</label>
                    <input type="number" id="Q_roof" value="2500" min="1000" max="4000" step="100">
                </div>
            </section>
            
            <!-- Control Parameters -->
            <section>
                <h2>Control Settings</h2>
                <div class="parameter-group">
                    <label>PI Gain (k_PI):</label>
                    <input type="number" id="k_PI" value="0.3" min="0.1" max="1.0" step="0.05">
                </div>
                <div class="parameter-group">
                    <label>PI Time Constant (Ti_PI) [s]:</label>
                    <input type="number" id="Ti_PI" value="500" min="100" max="1000" step="50">
                </div>
            </section>
            
            <!-- Generation Options -->
            <section>
                <h2>Output Options</h2>
                <div class="checkbox-group">
                    <input type="checkbox" id="generateFMU" checked>
                    <label for="generateFMU">Generate FMU file (requires Dymola)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="includeTests" checked>
                    <label for="includeTests">Include test scenarios</label>
                </div>
            </section>
            
            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-primary">Generate Project</button>
                <button type="button" class="btn-secondary" onclick="loadDefaults()">Load Defaults</button>
            </div>
        </form>
        
        <!-- Progress/Results -->
        <div id="results" style="display:none">
            <h2>✅ Project Generated Successfully!</h2>
            <p id="projectPath"></p>
            <button onclick="downloadProject()">Download Project</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
